<div class="fixed bottom-5 right-5 z-50">
  @if (!isOpen) {
    <button
      type="button"
      (click)="toggleChat()"
      class="flex h-16 w-16 cursor-pointer items-center justify-center rounded-full bg-yellow-500 text-black shadow-2xl transition hover:scale-105 hover:bg-yellow-400"
      aria-label="Open NileGuide AI chat"
    >
      <i class="fa-regular fa-message text-2xl"></i>
    </button>
  }

  @if (isOpen) {
    <div class="flex h-[560px] w-[430px] max-w-[calc(100vw-40px)] flex-col overflow-hidden rounded-2xl border border-white/10 bg-[#1b1915] text-white shadow-2xl">
      <div class="flex items-center justify-between border-b border-white/10 px-5 py-4">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-full bg-yellow-500/10 text-yellow-400">
            <i class="fa-solid fa-robot"></i>
          </div>

          <div>
            <h3 class="text-lg font-bold text-white">NileGuide AI</h3>
            <p class="text-sm font-medium text-white/60">Always here to help</p>
          </div>
        </div>

        <button
          type="button"
          (click)="closeChat()"
          class="cursor-pointer text-white/70 transition hover:text-yellow-400"
          aria-label="Close chat"
        >
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto px-5 py-5">
        <div class="space-y-4">
          @for (message of messages; track $index) {
            <div
              class="flex"
              [class.justify-end]="message.sender === 'user'"
              [class.justify-start]="message.sender === 'bot'"
            >
              <div
                class="max-w-[82%] rounded-xl border px-4 py-3 text-sm leading-6"
                [class.border-white/10]="message.sender === 'bot'"
                [class.bg-[#27241b]]="message.sender === 'bot'"
                [class.text-white/90]="message.sender === 'bot'"
                [class.border-yellow-500/20]="message.sender === 'user'"
                [class.bg-yellow-500]="message.sender === 'user'"
                [class.text-black]="message.sender === 'user'"
              >
                {{ message.text }}
              </div>
            </div>
          }
        </div>

        <div class="mt-4 flex flex-wrap gap-3">
          @for (question of quickQuestions; track question) {
            <button
              type="button"
              (click)="sendQuickQuestion(question)"
              class="cursor-pointer rounded-full bg-white/10 px-4 py-2 text-sm font-medium text-white/70 transition hover:bg-yellow-500 hover:text-black"
            >
              {{ question }}
            </button>
          }
        </div>
      </div>

      <div class="border-t border-white/10 p-4">
        <form class="flex gap-3" (ngSubmit)="sendMessage()">
          <input
            type="text"
            name="messageText"
            [(ngModel)]="messageText"
            placeholder="Ask about Egypt..."
            class="min-w-0 flex-1 rounded-xl border border-yellow-500/40 bg-transparent px-4 py-3 text-sm text-white outline-none placeholder:text-white/45 focus:border-yellow-400"
          />

          <button
            type="submit"
            class="flex h-12 w-12 cursor-pointer items-center justify-center rounded-xl bg-yellow-500 text-black transition hover:bg-yellow-400"
            aria-label="Send message"
          >
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>
  }
</div>
